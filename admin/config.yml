backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

media_library:
  name: uploadcare
  config:
    publicKey: "demopublickey"

collections:
  - name: "galerie"
    label: "Galerie"
    folder: "content/galerie"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Titre"
        name: "title"
        widget: "string"
      - label: "Image"
        name: "image"
        widget: "image"
      - label: "Vidéo (lien)"
        name: "video"
        widget: "string"
        required: false
      - label: "Texte"
        name: "body"
        widget: "markdown"
        required: false
